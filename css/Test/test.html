<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header + Side Menu Test</title>

    <link rel="stylesheet" href="test.css">
</head>
<body>

<!-- HEADER -->
<header class="header">

    <div class="header-content">
        <div class="logo">
            Made by <span>Kelly</span>
        </div>

        <div class="hamburger" id="hamburger">☰</div>
    </div>

</header>

<!-- OVERLAY -->
<div class="overlay-bg" id="overlay"></div>

<!-- SIDE MENU -->
<div class="side-menu" id="sideMenu">
    <a href="#">Home</a>
    <a href="#">Shop</a>
    <a href="#">Bridesmaid Gifts</a>
    <a href="#">Gift Sets</a>
    <a href="#">Price List</a>
    <a href="#">Customize</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</div>

<!-- HERO -->
<section class="hero">

    <div class="slide active" style="background-image:url('https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9');"></div>
    <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1523438097201-512ae7d59c7b');"></div>
    <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1519741497674-611481863552');"></div>

    <div class="overlay-text">
        <h1>Handcrafted Gifts</h1>
        <p>Test mobile + desktop layout</p>
        <a href="#" class="btn">Shop Now</a>
    </div>

</section>

<script>
const hamburger = document.getElementById("hamburger");
const sideMenu = document.getElementById("sideMenu");
const overlay = document.getElementById("overlay");

function openMenu() {
    sideMenu.classList.add("active");
    overlay.classList.add("active");
}

function closeMenu() {
    sideMenu.classList.remove("active");
    overlay.classList.remove("active");
}

hamburger.addEventListener("click", openMenu);
overlay.addEventListener("click", closeMenu);
</script>

</body>
</html>
